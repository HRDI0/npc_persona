quest_id: q_pig_escape
title: 말랑돼지 탈출
quest_type: quiz
main_location_id: east_farm
involved_npc_ids:
- minmin_lady
- patrol_leader_rio
- mage_lumi
- chief_rowan
required_clue_ids:
- clue_pig_tracks
- clue_glittering_powder
answer_truth_ids:
- truth_spore_scent_attraction
states:
- not_started
- in_progress
- hint_1_given
- hint_2_given
- ready_to_answer
- solved
story_expansion:
  episode_order: 2
  quest_role: physical_evidence
  type: investigation_quiz
  summary: 말랑돼지 탈출을 먹이 문제로 단정하지 않고, 발자국과 반짝이는 가루를 통해 숲 방향의 반복성을 확인한다.
  main_location_ids:
  - east_farm
  - whispering_forest_entrance
  - training_ground
  optional_clue_ids:
  - clue_bright_mushroom
  story_purpose:
    summary: 생활 관찰에서 물리적 증거로 조사 범위를 확장한다.
    player_goal: 말랑돼지가 왜 같은 방향으로 움직였는지 추론한다.
    emotional_tone: 귀여운 소동 뒤에 있는 불안한 반복성.
  quest_steps:
  - step_id: check_fence
    title: 관찰
    objective: 동쪽 농장의 울타리 파손을 본다.
    npc_id: minmin_lady
    location_id: east_farm
    player_observation: 먹이는 충분하지만 우리가 반복적으로 비어 있다.
    npc_hint: 먹이 때문은 아닌 것 같구나.
    unlocked_clue_ids: []
    next_step_condition: 울타리 확인
  - step_id: follow_tracks
    title: 힌트
    objective: 발자국이 향한 방향을 따라간다.
    npc_id: patrol_leader_rio
    location_id: east_farm
    player_observation: 말랑돼지 발자국이 숲 입구 쪽으로 이어진다.
    npc_hint: 방향을 봐라. 흩어진 흔적이 아니다.
    unlocked_clue_ids:
    - clue_pig_tracks
    next_step_condition: 발자국 확인
  - step_id: inspect_powder
    title: 단서
    objective: 울타리 주변의 반짝이는 가루를 확인한다.
    npc_id: patrol_leader_rio
    location_id: east_farm
    player_observation: 가루가 발자국 주변에서 발견된다.
    npc_hint: 정체는 몰라도 같은 현장에 있다.
    unlocked_clue_ids:
    - clue_glittering_powder
    next_step_condition: 가루 확보
  - step_id: ask_lumi
    title: 추론
    objective: 루미에게 가루와 생물 반응의 관계를 묻는다.
    npc_id: mage_lumi
    location_id: magic_shop
    player_observation: 가루가 생물 행동과 연결될 가능성을 듣는다.
    npc_hint: 냄새나 자극이 있었을지도 몰라.
    unlocked_clue_ids: []
    next_step_condition: 가설 확보
  wrong_hypotheses:
  - hypothesis_id: pig_food_shortage
    text: 말랑돼지가 배고파서 도망쳤다.
    why_it_seems_possible: 가축이 울타리를 넘으면 먹이 문제로 보이기 쉽다.
    disproof_clue_ids:
    - clue_pig_tracks
    - clue_glittering_powder
    npc_reaction: 민민 부인은 먹이통이 비어 있지 않았다고 말한다.
  hint_flow:
    hint_0: 먹이통과 울타리를 먼저 본다.
    hint_1: 발자국이 흩어졌는지 방향성을 확인한다.
    hint_2: 발자국 주변의 반짝임을 놓치지 않는다.
    final_hint: 발자국과 가루가 같은 방향을 가리킨다.
  access_control_notes:
    farmer_view: 민민 부인은 먹이 문제가 아니며 밤 냄새와 울타리 주변 반짝임이 있었다고 말한다.
    knight_view: 리오는 발자국 방향과 가루 위치를 물리 증거로 제시한다.
    mage_view: 루미는 가루가 생물 행동에 영향을 주었을 가능성만 말한다.
    lord_view: 로완은 필수 단서가 모이기 전에는 말랑돼지가 끌린 최종 원인을 공개하지 않는다.
    forbidden_before_reveal: 몽실버섯 포자 냄새가 원인이라는 truth를 단서 전에는 확정하지 않는다.
  answer_reveal_policy:
    can_reveal_truth_before_required_clues: false
    required_before_reveal:
    - clue_pig_tracks
    - clue_glittering_powder
    npc_allowed_to_reveal:
    - chief_rowan
    npc_not_allowed_to_reveal:
    - minmin_lady
    - patrol_leader_rio
    - mage_lumi
  completion:
    player_answer_condition: required_clue_ids가 모두 확인되고 플레이어가 단서 연결을 말한다.
    success_dialogue: 단서가 충분히 모였을 때만 NPC가 추론을 인정한다.
    partial_success_dialogue: 방향은 맞지만 빠진 단서를 다시 확인하게 한다.
    after_effect: 마을은 즉시 크게 변하지 않지만 NPC별 후속 대사가 열린다.
